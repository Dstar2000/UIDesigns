<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>premium login · monkey clap + wave + blink</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 30% 30%, #1a2f3a, #071016);
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        padding: 1rem;
      }

      .auth-panel {
        --spacer: 2.5rem;
        --form-width: 420px;
        --avatar-size: 170px;
        --btn-height: 48px;

        width: var(--form-width);
        max-width: 100%;
        border-radius: 2.5rem;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        box-shadow:
          0 35px 60px -20px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        padding: var(--spacer) var(--spacer) calc(var(--spacer) * 0.8);
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .character {
        order: -1;
        width: var(--avatar-size);
        height: var(--avatar-size);
        border-radius: 50%;
        border: 3px solid #dbb48b;
        background: linear-gradient(145deg, #fad6b0, #e0b58b);
        box-shadow:
          0 20px 25px -10px rgba(0, 0, 0, 0.5),
          inset 0 -6px 8px rgba(90, 50, 20, 0.3);
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.8rem;
        transition: box-shadow 0.2s;
        transform: translateZ(0);
        overflow: hidden;
      }

      .character:hover {
        box-shadow:
          0 24px 28px -10px #00000080,
          inset 0 -5px 8px #5a321e;
      }

      .character svg {
        position: absolute;
        width: calc(var(--avatar-size) - 12px);
        height: calc(var(--avatar-size) - 12px);
        pointer-events: none;
        transition: transform 0.1s cubic-bezier(0.2, 0.9, 0.3, 1);
      }

      #face {
        z-index: 1;
        filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3));
      }

      #hands {
        z-index: 3;
        transform: translateY(calc(var(--avatar-size) / 1.3)) rotateX(-18deg)
          scale(1.02);
        filter: drop-shadow(0 14px 8px rgba(0, 0, 0, 0.4));
        animation: handWave 3s ease-in-out infinite;
      }

      @keyframes handWave {
        0%,
        100% {
          transform: translateY(calc(var(--avatar-size) / 1.3)) rotateX(-18deg)
            scale(1.02);
        }
        25% {
          transform: translateY(calc(var(--avatar-size) / 1.3 - 3px))
            rotateX(-12deg) rotateZ(-3deg) scale(1.02);
        }
        50% {
          transform: translateY(calc(var(--avatar-size) / 1.3 - 2px))
            rotateX(-15deg) rotateZ(4deg) scale(1.02);
        }
        75% {
          transform: translateY(calc(var(--avatar-size) / 1.3 - 4px))
            rotateX(-10deg) rotateZ(-2deg) scale(1.02);
        }
      }

      .clap-animation {
        animation: handClap 0.5s ease-in-out 2 !important;
      }

      @keyframes handClap {
        0%,
        100% {
          transform: translateY(calc(var(--avatar-size) / 1.3)) rotateX(-18deg)
            scale(1.02);
        }
        25% {
          transform: translateY(calc(var(--avatar-size) / 1.3 - 6px))
            rotateX(-5deg) rotateZ(-6deg) scale(1.1);
        }
        50% {
          transform: translateY(calc(var(--avatar-size) / 1.3 - 10px))
            rotateX(0deg) rotateZ(0deg) scale(1.15);
        }
        75% {
          transform: translateY(calc(var(--avatar-size) / 1.3 - 4px))
            rotateX(-10deg) rotateZ(5deg) scale(1.05);
        }
      }

      .shake-monkey {
        animation: monkeyShake 0.4s ease-in-out !important;
      }
      @keyframes monkeyShake {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-7px);
        }
        40% {
          transform: translateX(7px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(4px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .character::after {
        content: "";
        position: absolute;
        bottom: 19%;
        width: 28px;
        height: 10px;
        border-bottom: 4px solid #402e22;
        border-radius: 0 0 20px 20px;
        z-index: 4;
      }

      /* Realistic eye blinking animation - slow and natural */
      @keyframes realisticBlink {
        0%,
        95%,
        100% {
          ry: 4.5;
          cy: 31.7;
        }
        96%,
        98% {
          ry: 0.8;
          cy: 30.5;
        }
        97%,
        99% {
          ry: 4.5;
          cy: 31.7;
        }
      }

      #face .eyeball {
        animation: realisticBlink 5s infinite;
      }

      #peek-toggle:checked ~ .character #face .eyeball {
        ry: 0.8;
        cy: 30.2;
        fill: #4a3a2a;
        animation: none;
      }

      #peek-toggle:checked ~ .character::after {
        width: 20px;
        height: 0;
        border-bottom: 6px solid #402e22;
        border-radius: 50%;
        transform: translateY(-2px);
      }

      #peek-toggle:checked ~ .character #hands {
        animation: none;
        transform: translate3d(0, 4px, 0) rotateX(2deg) scale(1.02);
      }

      .credentials {
        width: 100%;
        margin-top: 0.5rem;
      }

      .heading {
        font-size: 2.2rem;
        font-weight: 700;
        color: #144a5e;
        border-bottom: 3px solid #cbddee;
        padding-bottom: 0.6rem;
        margin-bottom: 2rem;
        letter-spacing: -0.5px;
      }

      .field-group {
        position: relative;
        margin: 2rem 0 1.5rem 0;
      }

      .field-group input {
        width: 100%;
        padding: 14px 0;
        border: none;
        border-bottom: 2px solid #94a3b8;
        background: transparent;
        color: #0b2b36;
        font-size: 1rem;
        transition: border-color 0.2s;
        outline: none;
      }

      .field-group input:focus {
        border-bottom-color: #1f7a9e;
      }

      .wavy-label {
        position: absolute;
        left: 0;
        top: 14px;
        pointer-events: none;
        color: #3d6375;
        white-space: nowrap;
        font-weight: 500;
      }

      .wavy-label span {
        display: inline-block;
        transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        transition-delay: calc(20ms * var(--i));
        font-size: 1rem;
      }

      .field-group input:focus + .wavy-label span,
      .field-group input:not(:placeholder-shown) + .wavy-label span {
        transform: translateY(-28px);
        color: #1f7a9e;
      }

      .field-group.error input {
        border-bottom-color: #f05b5b;
      }

      .error-message {
        color: #f05b5b;
        font-size: 0.75rem;
        margin-top: 4px;
        min-height: 18px;
        font-weight: 500;
      }

      .eye-icon {
        position: absolute;
        right: 0;
        top: 14px;
        cursor: pointer;
        font-size: 1.25rem;
        opacity: 0.6;
        transition: opacity 0.2s;
        user-select: none;
        z-index: 5;
      }
      .eye-icon:hover {
        opacity: 1;
      }

      .visibility-toggle {
        display: none;
      }

      .toggle-switch {
        user-select: none;
        cursor: pointer;
        z-index: 10;
        position: absolute;
        right: calc(var(--spacer) + 8px);
        bottom: calc(var(--spacer) + var(--btn-height) + 70px);
        padding: 6px 0;
        width: 70px;
        border-radius: 40px;
        background: #ffffff;
        color: #1f4a5c;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.9rem;
        box-shadow: 0 4px 12px rgba(0, 30, 40, 0.2);
        border: 1px solid #c1d9e8;
        transition: all 0.2s;
        transform: translateZ(0);
      }

      .toggle-switch:hover {
        color: #0c2f3f;
        background: #f5faff;
        border-color: #7fa3c0;
        transform: scale(1.02) translateZ(0);
      }

      .visibility-toggle ~ .toggle-switch span.show,
      .visibility-toggle:checked ~ .toggle-switch span.hide {
        display: none;
      }

      .visibility-toggle ~ .toggle-switch span.hide,
      .visibility-toggle:checked ~ .toggle-switch span.show {
        display: block;
      }

      .action-btn {
        height: var(--btn-height);
        width: 100%;
        border: none;
        background: linear-gradient(145deg, #ffffff, #e7f1fa);
        border: 1.5px solid #2b7c9c;
        font-weight: 700;
        color: #10455c;
        font-size: 1.2rem;
        border-radius: 60px;
        margin: 1rem 0 0.5rem;
        cursor: pointer;
        transition: 0.15s;
        box-shadow: 0 8px 20px rgba(25, 90, 120, 0.25);
      }
      .action-btn:hover {
        background: #e1f0fc;
        border-color: #0b6390;
        transform: scale(1.02);
        box-shadow: 0 10px 24px #115c7e40;
      }

      #right-eye-group,
      #left-eye-group,
      .eye-highlight,
      .eye-gleam {
        transition: transform 0.05s linear;
      }

      .eyeball {
        transition:
          ry 0.1s ease,
          cy 0.1s ease,
          fill 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div class="auth-panel" id="authPanel">
      <input
        type="checkbox"
        id="peek-toggle"
        class="visibility-toggle"
        hidden
      />

      <label for="peek-toggle" class="character" id="monkeyCharacter">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="face">
          <ellipse cx="53.7" cy="33" rx="8.3" ry="8.2" fill="#9b7a5a" />
          <ellipse cx="53.7" cy="33" rx="5.4" ry="5.4" fill="#ffdbca" />
          <ellipse cx="10.2" cy="33" rx="8.2" ry="8.2" fill="#9b7a5a" />
          <ellipse cx="10.2" cy="33" rx="5.4" ry="5.4" fill="#ffdbca" />
          <g fill="#a58362">
            <path
              d="m43.4 10.8c1.1-.6 1.9-.9 1.9-.9-3.2-1.1-6-1.8-8.5-2.1 1.3-1 2.1-1.3 2.1-1.3-20.4-2.9-30.1 9-30.1 19.5h46.4c-.7-7.4-4.8-12.4-11.8-15.2"
            />
            <path
              d="m55.3 27.6c0-9.7-10.4-17.6-23.3-17.6s-23.3 7.9-23.3 17.6c0 2.3.6 4.4 1.6 6.4-1 2-1.6 4.2-1.6 6.4 0 9.7 10.4 17.6 23.3 17.6s23.3-7.9 23.3-17.6c0-2.3-.6-4.4-1.6-6.4 1-2 1.6-4.2 1.6-6.4"
            />
          </g>
          <path
            d="m52 28.2c0-16.9-20-6.1-20-6.1s-20-10.8-20 6.1c0 4.7 2.9 9 7.5 11.7-1.3 1.7-2.1 3.6-2.1 5.7 0 6.1 6.6 11 14.7 11s14.7-4.9 14.7-11c0-2.1-.8-4-2.1-5.7 4.4-2.7 7.3-7 7.3-11.7"
            fill="#e9be96"
          />
          <g fill="#352c24">
            <ellipse cx="35.1" cy="38.7" rx="1.2" ry="1.8" />
            <ellipse cx="30.9" cy="38.7" rx="1.2" ry="1.8" />
          </g>
          <g id="right-eye-group">
            <ellipse
              cx="40.7"
              cy="31.7"
              rx="3.5"
              ry="4.5"
              fill="#3e2f21"
              class="eyeball"
            />
            <circle
              cx="41.8"
              cy="30.2"
              r="1"
              fill="#fff"
              opacity="0.9"
              class="eye-highlight"
            />
            <circle cx="41.2" cy="29.8" r="0.5" fill="#fff" class="eye-gleam" />
          </g>
          <g id="left-eye-group">
            <ellipse
              cx="23.3"
              cy="31.7"
              rx="3.5"
              ry="4.5"
              fill="#3e2f21"
              class="eyeball"
            />
            <circle
              cx="24.4"
              cy="30.2"
              r="1"
              fill="#fff"
              opacity="0.9"
              class="eye-highlight"
            />
            <circle cx="23.8" cy="29.8" r="0.5" fill="#fff" class="eye-gleam" />
          </g>
          <path
            d="M45 24 Q 42 21 38 22"
            stroke="#2b1f17"
            stroke-width="1.2"
            fill="none"
            opacity="0.6"
          />
          <path
            d="M19 24 Q 22 21 26 22"
            stroke="#2b1f17"
            stroke-width="1.2"
            fill="none"
            opacity="0.6"
          />
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="hands">
          <path
            fill="#9b7a5a"
            d="M9.4,32.5L2.1,61.9H14c-1.6-7.7,4-21,4-21L9.4,32.5z"
          />
          <path
            fill="#f5d2b3"
            d="M15.8,24.8c0,0,4.9-4.5,9.5-3.9c2.3,0.3-7.1,7.6-7.1,7.6s9.7-8.2,11.7-5.6c1.8,2.3-8.9,9.8-8.9,9.8 s10-8.1,9.6-4.6c-0.3,3.8-7.9,12.8-12.5,13.8C11.5,43.2,6.3,39,9.8,24.4C11.6,17,13.3,25.2,15.8,24.8"
          />
          <path
            fill="#9b7a5a"
            d="M54.8,32.5l7.3,29.4H50.2c1.6-7.7-4-21-4-21L54.8,32.5z"
          />
          <path
            fill="#f5d2b3"
            d="M48.4,24.8c0,0-4.9-4.5-9.5-3.9c-2.3,0.3,7.1,7.6,7.1,7.6s-9.7-8.2-11.7-5.6c-1.8,2.3,8.9,9.8,8.9,9.8 s-10-8.1-9.7-4.6c0.4,3.8,8,12.8,12.6,13.8c6.6,1.3,11.8-2.9,8.3-17.5C52.6,17,50.9,25.2,48.4,24.8"
          />
          <path
            d="M20 36 Q 22 39 25 38"
            stroke="#7a5f44"
            fill="none"
            opacity="0.4"
          />
          <path
            d="M44 36 Q 42 39 39 38"
            stroke="#7a5f44"
            fill="none"
            opacity="0.4"
          />
        </svg>
      </label>

      <form class="credentials" id="loginForm" novalidate>
        <div class="heading">log in</div>

        <div class="field-group" id="groupEmail">
          <input
            type="email"
            id="emailInput"
            placeholder=" "
            spellcheck="false"
          />
          <label class="wavy-label" for="emailInput">
            <span style="--i: 0">E</span>
            <span style="--i: 1">m</span>
            <span style="--i: 2">a</span>
            <span style="--i: 3">i</span>
            <span style="--i: 4">l</span>
          </label>
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="field-group" id="groupPassword">
          <input
            type="password"
            id="passwordInput"
            placeholder=" "
            spellcheck="false"
          />
          <label class="wavy-label" for="passwordInput">
            <span style="--i: 0">P</span>
            <span style="--i: 1">a</span>
            <span style="--i: 2">s</span>
            <span style="--i: 3">s</span>
            <span style="--i: 4">w</span>
            <span style="--i: 5">o</span>
            <span style="--i: 6">r</span>
            <span style="--i: 7">d</span>
          </label>
          <span class="eye-icon" id="togglePasswordEye">👁️</span>
          <div class="error-message" id="passwordError"></div>
        </div>

        <button type="button" class="action-btn" id="signinBtn">
          Sign in →
        </button>
      </form>
    </div>

    <script>
      (function () {
        const authPanel = document.getElementById("authPanel");
        const handsSVG = document.getElementById("hands");
        const monkeyChar = document.getElementById("monkeyCharacter");
        const signinBtn = document.getElementById("signinBtn");
        const emailInput = document.getElementById("emailInput");
        const passInput = document.getElementById("passwordInput");
        const emailError = document.getElementById("emailError");
        const passError = document.getElementById("passwordError");
        const groupEmail = document.getElementById("groupEmail");
        const groupPass = document.getElementById("groupPassword");
        const toggleEye = document.getElementById("togglePasswordEye");
        const peekToggle = document.getElementById("peek-toggle");

        const rightEyeGroup = document.getElementById("right-eye-group");
        const leftEyeGroup = document.getElementById("left-eye-group");
        const rightHighlights = document.querySelectorAll(
          "#right-eye-group .eye-highlight, #right-eye-group .eye-gleam",
        );
        const leftHighlights = document.querySelectorAll(
          "#left-eye-group .eye-highlight, #left-eye-group .eye-gleam",
        );

        function initEyeTracking() {
          if (!rightEyeGroup || !leftEyeGroup) return;
          const containerRect = authPanel.getBoundingClientRect();

          document.addEventListener("mousemove", (e) => {
            const mouseX = e.clientX,
              mouseY = e.clientY;
            const centerX = containerRect.left + containerRect.width / 2;
            const centerY = containerRect.top + containerRect.height / 2;
            const deltaX = mouseX - centerX;
            const deltaY = mouseY - centerY;
            const distance = Math.hypot(deltaX, deltaY);
            const maxDist =
              Math.max(containerRect.width, containerRect.height) / 2;
            const factor = Math.min(distance / maxDist, 1);
            const maxMove = 2.0;
            const moveX = distance ? (deltaX / distance) * factor * maxMove : 0;
            const moveY = distance ? (deltaY / distance) * factor * maxMove : 0;
            const transform = `translate(${moveX}px, ${moveY}px) translateZ(0)`;

            if (rightEyeGroup) rightEyeGroup.style.transform = transform;
            if (leftEyeGroup) leftEyeGroup.style.transform = transform;
            rightHighlights.forEach((el) => {
              if (el) el.style.transform = transform;
            });
            leftHighlights.forEach((el) => {
              if (el) el.style.transform = transform;
            });
          });

          window.addEventListener("resize", () => {
            const newRect = authPanel.getBoundingClientRect();
            containerRect.left = newRect.left;
            containerRect.top = newRect.top;
            containerRect.width = newRect.width;
            containerRect.height = newRect.height;
          });
        }
        if (rightEyeGroup && leftEyeGroup) initEyeTracking();
        else setTimeout(initEyeTracking, 200);

        toggleEye.addEventListener("click", () => {
          const type =
            passInput.getAttribute("type") === "password" ? "text" : "password";
          passInput.setAttribute("type", type);
          peekToggle.checked = type === "text";
        });

        peekToggle.addEventListener("change", function () {
          passInput.setAttribute("type", this.checked ? "text" : "password");
        });

        function validateEmail(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function setFieldError(group, errorEl, msg) {
          errorEl.textContent = msg;
          if (msg) {
            group.classList.add("error");
          } else {
            group.classList.remove("error");
          }
        }

        function validateForm() {
          let isValid = true;
          const emailVal = emailInput.value.trim();
          const passVal = passInput.value;

          if (!emailVal) {
            setFieldError(groupEmail, emailError, "Email is required");
            isValid = false;
          } else if (!validateEmail(emailVal)) {
            setFieldError(groupEmail, emailError, "Enter a valid email");
            isValid = false;
          } else {
            setFieldError(groupEmail, emailError, "");
          }

          if (!passVal) {
            setFieldError(groupPass, passError, "Password is required");
            isValid = false;
          } else if (passVal.length < 6) {
            setFieldError(groupPass, passError, "Minimum 6 characters");
            isValid = false;
          } else {
            setFieldError(groupPass, passError, "");
          }

          return isValid;
        }

        emailInput.addEventListener("input", () =>
          setFieldError(groupEmail, emailError, ""),
        );
        passInput.addEventListener("input", () =>
          setFieldError(groupPass, passError, ""),
        );

        function shakeMonkey() {
          monkeyChar.classList.add("shake-monkey");
          setTimeout(() => monkeyChar.classList.remove("shake-monkey"), 500);
        }

        signinBtn.addEventListener("click", function () {
          const valid = validateForm();

          if (valid) {
            handsSVG.classList.add("clap-animation");
            setTimeout(() => handsSVG.classList.remove("clap-animation"), 1100);
          } else {
            shakeMonkey();
            if (groupEmail.classList.contains("error")) {
              groupEmail.style.animation = "shake 0.3s ease";
              setTimeout(() => (groupEmail.style.animation = ""), 300);
            }
            if (groupPass.classList.contains("error")) {
              groupPass.style.animation = "shake 0.3s ease";
              setTimeout(() => (groupPass.style.animation = ""), 300);
            }
          }
        });

        const style = document.createElement("style");
        style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }`;
        document.head.appendChild(style);
      })();
    </script>
  </body>
</html>
