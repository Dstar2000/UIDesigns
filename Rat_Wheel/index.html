<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rat - Loading</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #2b3a4a 0%, #1d2a35 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
      }

      .scene {
        filter: drop-shadow(0 1.5em 2em rgba(0, 0, 0, 0.6));
      }

      .wheel-and-rat {
        --dur: 1.4s;
        position: relative;
        width: 14em;
        height: 14em;
        font-size: 18px;
        transform: scale(1.8);
      }

      .wheel,
      .rat,
      .rat div,
      .spoke,
      .hub {
        position: absolute;
      }

      .wheel {
        border-radius: 50%;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        box-shadow:
          0 0 0 2px rgba(0, 0, 0, 0.2),
          inset 0 0 10px rgba(180, 220, 255, 0.7);
        z-index: 2;
      }

      .spoke {
        border-radius: 50%;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        animation: spoke var(--dur) linear infinite;
        background:
          linear-gradient(
            45deg,
            transparent 48%,
            hsl(40, 30%, 75%) 48.5% 51.5%,
            transparent 52%
          ),
          linear-gradient(
            135deg,
            transparent 48%,
            hsl(40, 30%, 75%) 48.5% 51.5%,
            transparent 52%
          );
        background-repeat: no-repeat;
        background-position: center;
        background-size: 100% 100%;
        opacity: 0.7;
        mix-blend-mode: screen;
        z-index: 3;
      }

      .hub {
        width: 1.4em;
        height: 1.4em;
        background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow:
          0 0 0 2px rgba(255, 215, 0, 0.4),
          inset 0 2px 5px rgba(0, 0, 0, 0.2),
          0 3px 6px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 215, 0, 0.8);
        z-index: 4;
      }

      .hub::after {
        content: "";
        position: absolute;
        width: 0.45em;
        height: 0.45em;
        background: rgba(255, 255, 200, 0.9);
        border-radius: 50%;
        top: 0.2em;
        left: 0.2em;
        filter: blur(0.5px);
      }

      .rat {
        animation: rat var(--dur) ease-in-out infinite;
        top: 55%;
        left: calc(50% - 3.5em);
        width: 7em;
        height: 3.75em;
        transform: rotate(4deg) translate(-0.8em, 1.85em);
        transform-origin: 50% 0;
        z-index: 5;
      }

      .rat__head {
        animation: ratHead var(--dur) ease-in-out infinite;
        background: linear-gradient(145deg, #d4a574, #8b5a2b);
        border-radius: 70% 30% 0 100% / 40% 25% 25% 60%;
        box-shadow:
          0 -0.25em 0 #e6b17e inset,
          0.75em -1.55em 0 #f4cba1 inset,
          -0.2em 0.2em 4px rgba(0, 0, 0, 0.15);
        top: 0;
        left: -2em;
        width: 2.75em;
        height: 2.5em;
        transform-origin: 100% 50%;
      }

      .rat__ear {
        animation: ratEar var(--dur) ease-in-out infinite;
        background: radial-gradient(
          circle at 30% 40%,
          #f4d5a4 30%,
          #a0522d 90%
        );
        border-radius: 50%;
        box-shadow:
          -0.2em 0.1em 0 #b96f3c inset,
          0 0 0 1px rgba(255, 220, 150, 0.6);
        top: -0.35em;
        right: -0.2em;
        width: 0.9em;
        height: 0.9em;
        transform-origin: 50% 75%;
      }

      .rat__eye {
        animation: ratEye var(--dur) linear infinite;
        background: radial-gradient(
          circle at 40% 35%,
          #ffffff 0.15em,
          #3a2819 0.4em
        );
        border-radius: 50%;
        top: 0.4em;
        left: 1.2em;
        width: 0.65em;
        height: 0.65em;
        box-shadow: 0 0 0 1px rgba(255, 230, 170, 0.9);
      }

      .rat__nose {
        background: #c94f4f;
        border-radius: 45% 55% 70% 30% / 60% 50% 50% 40%;
        top: 0.8em;
        left: 0.1em;
        width: 0.28em;
        height: 0.32em;
        box-shadow: 0.1em 0.05em 0 #6b2e2e;
        z-index: 3;
      }

      .rat__head::before,
      .rat__head::after {
        content: "";
        position: absolute;
        width: 0.5em;
        height: 0.1em;
        background: #8b5a2b;
        border-radius: 2px;
        opacity: 0.7;
        filter: blur(0.5px);
      }
      .rat__head::before {
        top: 1.1em;
        left: -0.1em;
        transform: rotate(-10deg);
        box-shadow: -0.15em 0.1em 0 #8b5a2b;
      }
      .rat__head::after {
        top: 1.3em;
        left: -0.15em;
        transform: rotate(5deg);
        width: 0.55em;
      }

      .rat__body {
        animation: ratBody var(--dur) ease-in-out infinite;
        background: linear-gradient(160deg, #d9b382, #9c6b3d);
        border-radius: 50% 30% 50% 30% / 15% 60% 40% 40%;
        box-shadow:
          0.1em 0.75em 0 #b87c4b inset,
          0.15em -0.5em 0 #e5b886 inset,
          0.2em 0.3em 6px rgba(0, 0, 0, 0.15);
        top: 0.25em;
        left: 2em;
        width: 4.5em;
        height: 3em;
        transform-origin: 17% 50%;
        transform-style: preserve-3d;
      }

      .rat__limb--fr,
      .rat__limb--fl {
        clip-path: polygon(0 0, 100% 0, 70% 80%, 60% 100%, 0% 100%, 40% 80%);
        top: 2em;
        left: 0.5em;
        width: 1em;
        height: 1.5em;
        transform-origin: 50% 0;
        filter: drop-shadow(0.05em 0.1em 1px rgba(0, 0, 0, 0.2));
      }
      .rat__limb--fr {
        animation: ratFRLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #b87c4b 30%, #8b5a2b 90%);
        transform: rotate(15deg) translateZ(-1px);
      }
      .rat__limb--fl {
        animation: ratFLLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #d4a574 30%, #9c6b3d 90%);
        transform: rotate(15deg);
      }

      .rat__limb--br,
      .rat__limb--bl {
        border-radius: 0.75em 0.75em 0 0;
        clip-path: polygon(
          0 0,
          100% 0,
          100% 30%,
          70% 90%,
          70% 100%,
          30% 100%,
          40% 90%,
          0% 30%
        );
        top: 1em;
        left: 2.8em;
        width: 1.5em;
        height: 2.5em;
        transform-origin: 50% 30%;
        filter: drop-shadow(0.1em 0.15em 1px rgba(0, 0, 0, 0.15));
      }
      .rat__limb--br {
        animation: ratBRLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #a66f3c 30%, #6b431e 90%);
        transform: rotate(-25deg) translateZ(-1px);
      }
      .rat__limb--bl {
        animation: ratBLLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #c18f54 30%, #8b5a2b 90%);
        transform: rotate(-25deg);
      }

      .rat__tail {
        animation: ratTail var(--dur) linear infinite;
        background: radial-gradient(ellipse at 30% 40%, #b87c4b, #6b431e);
        border-radius: 0.4em 60% 60% 0.4em;
        box-shadow:
          0 -0.15em 0 #9c6b3d inset,
          0.1em 0.1em 3px rgba(0, 0, 0, 0.15);
        top: 1.5em;
        right: -0.6em;
        width: 1.1em;
        height: 0.6em;
        transform: rotate(30deg) translateZ(-1px);
        transform-origin: 0.25em 0.25em;
      }

      @keyframes rat {
        from,
        to {
          transform: rotate(4deg) translate(-0.8em, 1.85em);
        }
        50% {
          transform: rotate(0) translate(-0.8em, 1.85em);
        }
      }
      @keyframes ratHead {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(0);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(8deg);
        }
      }
      @keyframes ratEye {
        from,
        90%,
        to {
          transform: scaleY(1);
        }
        95% {
          transform: scaleY(0);
        }
      }
      @keyframes ratEar {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(0);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(12deg);
        }
      }
      @keyframes ratBody {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(0);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(-2deg);
        }
      }
      @keyframes ratFRLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(50deg) translateZ(-1px);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(-30deg) translateZ(-1px);
        }
      }
      @keyframes ratFLLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(-30deg);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(50deg);
        }
      }
      @keyframes ratBRLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(-60deg) translateZ(-1px);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(20deg) translateZ(-1px);
        }
      }
      @keyframes ratBLLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(20deg);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(-60deg);
        }
      }
      @keyframes ratTail {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(30deg) translateZ(-1px);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(10deg) translateZ(-1px);
        }
      }
      @keyframes spoke {
        from {
          transform: rotate(0);
        }
        to {
          transform: rotate(-1turn);
        }
      }

      .scene::after {
        content: "";
        display: block;
        width: 15em;
        height: 1.8em;
        background: radial-gradient(
          ellipse at 50% 0%,
          rgba(0, 0, 0, 0.35) 0%,
          transparent 70%
        );
        margin: -1.2em auto 0;
        filter: blur(6px);
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div
        aria-label="Gray rat in wheel with outer rim, spokes and center hub"
        role="img"
        class="wheel-and-rat"
      >
        <div class="wheel"></div>
        <div class="hub"></div>
        <div class="spoke"></div>
        <div class="rat">
          <div class="rat__body">
            <div class="rat__head">
              <div class="rat__ear"></div>
              <div class="rat__eye"></div>
              <div class="rat__nose"></div>
            </div>
            <div class="rat__limb--fr"></div>
            <div class="rat__limb--fl"></div>
            <div class="rat__limb--br"></div>
            <div class="rat__limb--bl"></div>
            <div class="rat__tail"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
