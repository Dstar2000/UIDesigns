<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Horizontal Cards Reveal</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui;
      }

      body {
        background: #0b0d14;
        color: white;
        overflow-x: hidden;
      }

      .hero {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.3;
        font-size: 48px;
      }

      .track {
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      .horizontal {
        height: 100%;
        position: relative;
      }

      .panel {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
        font-weight: 700;
        clip-path: inset(0 0 0 0);
        background-size: cover;
        background-position: center;
      }

      /* IMAGE BACKGROUNDS */
      .p1 {
        background-image: url("https://images.unsplash.com/photo-1518779578993-ec3579fee39f?q=80&w=1920");
      }

      .p2 {
        background-image: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7?q=80&w=1920");
      }

      .p3 {
        background-image: url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1920");
      }

      .p4 {
        background-image: url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1920");
      }

      /* optional dark overlay for readability */
      .panel::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 0;
      }

      .panel span {
        position: relative;
        z-index: 1;
      }

      .progress {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
      }

      .bar {
        height: 100%;
        width: 0%;
        background: white;
      }
    </style>
  </head>

  <body>
    <div class="hero">Scroll</div>

    <div class="track">
      <div class="horizontal">
        <div class="panel p1"><span>Discover</span></div>
        <div class="panel p2"><span>Design</span></div>
        <div class="panel p3"><span>Build</span></div>
        <div class="panel p4"><span>Launch</span></div>
      </div>
    </div>

    <div class="hero">End</div>

    <div class="progress"><div class="bar"></div></div>

    <script>
      gsap.registerPlugin(ScrollTrigger);

      const panels = gsap.utils.toArray(".panel");

      panels.forEach((p, i) => {
        gsap.set(p, { zIndex: panels.length - i });
      });

      let tl = gsap.timeline({
        scrollTrigger: {
          trigger: ".track",
          pin: true,
          scrub: 1,
          end: `+=${window.innerWidth * panels.length}`,
          onUpdate: (s) => gsap.to(".bar", { width: s.progress * 100 + "%" }),
        },
      });

      panels.forEach((panel, i) => {
        if (i === panels.length - 1) return;

        tl.to(panel, {
          clipPath: "inset(0 100% 0 0)",
          duration: 1,
          ease: "none",
        });
      });
    </script>
  </body>
</html>
