<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rat · L_O_A_D_I_N_G</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #1f2e3f 0%, #14222e 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
      }

      .scene {
        filter: drop-shadow(0 1.5em 2.5em rgba(0, 0, 0, 0.7));
      }

      .wheel-and-rat {
        --dur: 1.8s;
        position: relative;
        width: 14em;
        height: 14em;
        font-size: 18px;
      }

      .rat,
      .rat div,
      .hub,
      .rotating-wheel {
        position: absolute;
      }

      .rotating-wheel {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        animation: spinWheel var(--dur) linear infinite;
        z-index: 3;
      }

      .rotating-wheel::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        box-shadow:
          0 0 0 4px rgba(255, 200, 100, 0.6),
          0 0 0 8px rgba(100, 180, 255, 0.3),
          inset 0 0 30px #ffd58c;
        z-index: 2;
      }

      .rotating-wheel .s-pattern {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
      }

      .s-pattern::before,
      .s-pattern::after,
      .s-pattern .s1,
      .s-pattern .s2,
      .s-pattern .s3,
      .s-pattern .s4 {
        content: "";
        position: absolute;
        width: 5.2em;
        height: 2.2em;
        background: linear-gradient(145deg, #ffb347, #c87900);
        border-radius: 45% 55% 50% 50% / 60% 50% 50% 40%;
        filter: blur(0.5px) drop-shadow(0 0 8px #ffaa33);
        opacity: 0.9;
        mix-blend-mode: hard-light;
        box-shadow: 0 0 20px #ff9900;
      }

      .s-pattern::before {
        clip-path: path(
          "M 0.2,1.2 C 1.2,0.3 2.8,0.1 3.8,0.6 4.8,1.1 5.4,2.3 4.8,3.2 4.2,4.0 2.6,4.2 1.4,3.6 0.6,3.2 0,2.2 0.2,1.2 Z"
        );
        top: 10%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(0deg);
      }

      .s-pattern::after {
        clip-path: path(
          "M 0.3,1.5 C 1.3,0.6 2.9,0.2 4.1,0.8 5.2,1.4 5.7,2.9 4.8,3.7 3.9,4.5 2.1,4.4 1.0,3.6 0.3,3.1 -0.2,2.0 0.3,1.5 Z"
        );
        top: 10%;
        right: 50%;
        transform: translate(50%, -50%) rotate(0deg);
      }

      .s-pattern .s1 {
        clip-path: path(
          "M 0.2,1.2 C 1.2,0.3 2.8,0.1 3.8,0.6 4.8,1.1 5.4,2.3 4.8,3.2 4.2,4.0 2.6,4.2 1.4,3.6 0.6,3.2 0,2.2 0.2,1.2 Z"
        );
        bottom: 10%;
        left: 50%;
        transform: translate(-50%, 50%) rotate(180deg);
        background: linear-gradient(225deg, #ffc064, #b36b00);
      }

      .s-pattern .s2 {
        clip-path: path(
          "M 0.3,1.5 C 1.3,0.6 2.9,0.2 4.1,0.8 5.2,1.4 5.7,2.9 4.8,3.7 3.9,4.5 2.1,4.4 1.0,3.6 0.3,3.1 -0.2,2.0 0.3,1.5 Z"
        );
        bottom: 10%;
        right: 50%;
        transform: translate(50%, 50%) rotate(180deg);
        background: linear-gradient(225deg, #ffc064, #b36b00);
      }

      .s-pattern .s3 {
        clip-path: path(
          "M 0.2,1.2 C 1.2,0.3 2.8,0.1 3.8,0.6 4.8,1.1 5.4,2.3 4.8,3.2 4.2,4.0 2.6,4.2 1.4,3.6 0.6,3.2 0,2.2 0.2,1.2 Z"
        );
        top: 50%;
        left: 15%;
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      .s-pattern .s4 {
        clip-path: path(
          "M 0.3,1.5 C 1.3,0.6 2.9,0.2 4.1,0.8 5.2,1.4 5.7,2.9 4.8,3.7 3.9,4.5 2.1,4.4 1.0,3.6 0.3,3.1 -0.2,2.0 0.3,1.5 Z"
        );
        top: 50%;
        right: 15%;
        transform: translate(50%, -50%) rotate(45deg);
      }

      .rotating-wheel .rim-pattern {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;

        mask: radial-gradient(circle at center, transparent 65%, black 65.5%);
        -webkit-mask: radial-gradient(
          circle at center,
          transparent 65%,
          black 65.5%
        );
        z-index: 4;
        opacity: 0.8;
        mix-blend-mode: overlay;
      }

      .rotating-wheel .rim-pattern2 {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: repeating-conic-gradient(
          from 10deg,
          transparent 0deg 20deg,
          rgba(255, 220, 100, 0.7) 20deg 30deg,
          transparent 30deg 45deg
        );
        mask: radial-gradient(circle at center, transparent 68%, black 68.5%);
        -webkit-mask: radial-gradient(
          circle at center,
          transparent 68%,
          black 68.5%
        );
        z-index: 3;
        opacity: 0.6;
        mix-blend-mode: screen;
      }

      .hub {
        width: 1.8em;
        height: 1.8em;
        background: radial-gradient(circle at 40% 40%, #ffd700, #b8860b);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow:
          0 0 0 4px rgba(255, 215, 0, 0.5),
          inset 0 2px 10px #fff2b5,
          0 6px 15px #00000080;
        border: 1px solid #ffd700;
        z-index: 10;
      }

      .hub::after {
        content: "";
        position: absolute;
        width: 0.6em;
        height: 0.6em;
        background: #ffffe0;
        border-radius: 50%;
        top: 0.3em;
        left: 0.3em;
        filter: blur(1px);
        box-shadow: 0 0 10px gold;
      }

      .rat {
        animation: rat var(--dur) ease-in-out infinite;
        top: 55%;
        left: calc(50% - 3.5em);
        width: 7em;
        height: 3.75em;
        transform: rotate(4deg) translate(-0.8em, 1.85em);
        transform-origin: 50% 0;
        z-index: 20;
        filter: drop-shadow(2px 4px 6px #00000040);
      }

      .rat__head {
        animation: ratHead var(--dur) ease-in-out infinite;
        background: linear-gradient(145deg, #deaf7c, #8f6033);
        border-radius: 70% 30% 0 100% / 40% 25% 25% 60%;
        box-shadow:
          0 -0.2em 0 #ebbe8c inset,
          0.7em -1.4em 0 #fad3a1 inset,
          -0.2em 0.2em 6px rgba(0, 0, 0, 0.2);
        top: 0;
        left: -2em;
        width: 2.75em;
        height: 2.5em;
        transform-origin: 100% 50%;
      }

      .rat__ear {
        animation: ratEar var(--dur) ease-in-out infinite;
        background: radial-gradient(
          circle at 35% 45%,
          #fad6a0 30%,
          #a75e2c 90%
        );
        border-radius: 50%;
        box-shadow:
          -0.2em 0.1em 0 #bd7a47 inset,
          0 0 0 1px #ffdbaa;
        top: -0.35em;
        right: -0.2em;
        width: 0.95em;
        height: 0.95em;
        transform-origin: 50% 75%;
      }

      .rat__eye {
        animation: ratEye var(--dur) linear infinite;
        background: radial-gradient(
          circle at 40% 35%,
          #fffcf0 0.15em,
          #3f2d15 0.45em
        );
        border-radius: 50%;
        top: 0.4em;
        left: 1.2em;
        width: 0.68em;
        height: 0.68em;
        box-shadow: 0 0 0 2px #fbeac2;
      }

      .rat__nose {
        background: #cf5a5a;
        border-radius: 45% 55% 70% 30% / 60% 50% 50% 40%;
        top: 0.8em;
        left: 0.1em;
        width: 0.3em;
        height: 0.35em;
        box-shadow: 0.1em 0.05em 0 #6b2e2e;
        z-index: 3;
      }

      .rat__head::before,
      .rat__head::after {
        content: "";
        position: absolute;
        width: 0.5em;
        height: 0.1em;
        background: #8b5a2b;
        border-radius: 2px;
        opacity: 0.6;
        filter: blur(0.5px);
      }
      .rat__head::before {
        top: 1.1em;
        left: -0.1em;
        transform: rotate(-10deg);
        box-shadow: -0.15em 0.1em 0 #8b5a2b;
      }
      .rat__head::after {
        top: 1.3em;
        left: -0.15em;
        transform: rotate(5deg);
        width: 0.55em;
      }

      .rat__body {
        animation: ratBody var(--dur) ease-in-out infinite;
        background: linear-gradient(160deg, #ddb07c, #a2703d);
        border-radius: 50% 30% 50% 30% / 15% 60% 40% 40%;
        box-shadow:
          0.1em 0.8em 0 #be824e inset,
          0.1em -0.5em 0 #ebbc8a inset,
          0.3em 0.4em 8px #00000025;
        top: 0.25em;
        left: 2em;
        width: 4.5em;
        height: 3em;
        transform-origin: 17% 50%;
        transform-style: preserve-3d;
      }

      .rat__limb--fr,
      .rat__limb--fl {
        clip-path: polygon(0 0, 100% 0, 70% 80%, 60% 100%, 0% 100%, 40% 80%);
        top: 2em;
        left: 0.5em;
        width: 1em;
        height: 1.5em;
        transform-origin: 50% 0;
        filter: drop-shadow(0.05em 0.1em 1px rgba(0, 0, 0, 0.25));
      }
      .rat__limb--fr {
        animation: ratFRLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #c28a52 30%, #8f6030 90%);
        transform: rotate(15deg) translateZ(-1px);
      }
      .rat__limb--fl {
        animation: ratFLLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #dcab74 30%, #9f6e3b 90%);
        transform: rotate(15deg);
      }

      .rat__limb--br,
      .rat__limb--bl {
        border-radius: 0.75em 0.75em 0 0;
        clip-path: polygon(
          0 0,
          100% 0,
          100% 30%,
          70% 90%,
          70% 100%,
          30% 100%,
          40% 90%,
          0% 30%
        );
        top: 1em;
        left: 2.8em;
        width: 1.5em;
        height: 2.5em;
        transform-origin: 50% 30%;
        filter: drop-shadow(0.1em 0.15em 1px rgba(0, 0, 0, 0.2));
      }
      .rat__limb--br {
        animation: ratBRLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #ad763f 30%, #6d451e 90%);
        transform: rotate(-25deg) translateZ(-1px);
      }
      .rat__limb--bl {
        animation: ratBLLimb var(--dur) linear infinite;
        background: linear-gradient(145deg, #ca965a 30%, #8b5827 90%);
        transform: rotate(-25deg);
      }

      .rat__tail {
        animation: ratTail var(--dur) linear infinite;
        background: radial-gradient(ellipse at 30% 40%, #c0894f, #6e451d);
        border-radius: 0.4em 60% 60% 0.4em;
        box-shadow:
          0 -0.15em 0 #a5713b inset,
          0.1em 0.1em 4px #00000030;
        top: 1.5em;
        right: -0.6em;
        width: 1.2em;
        height: 0.65em;
        transform: rotate(30deg) translateZ(-1px);
        transform-origin: 0.25em 0.25em;
      }

      @keyframes rat {
        from,
        to {
          transform: rotate(4deg) translate(-0.8em, 1.85em);
        }
        50% {
          transform: rotate(0) translate(-0.8em, 1.85em);
        }
      }
      @keyframes ratHead {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(0);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(8deg);
        }
      }
      @keyframes ratEye {
        from,
        90%,
        to {
          transform: scaleY(1);
        }
        95% {
          transform: scaleY(0);
        }
      }
      @keyframes ratEar {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(0);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(12deg);
        }
      }
      @keyframes ratBody {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(0);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(-2deg);
        }
      }
      @keyframes ratFRLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(50deg) translateZ(-1px);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(-30deg) translateZ(-1px);
        }
      }
      @keyframes ratFLLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(-30deg);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(50deg);
        }
      }
      @keyframes ratBRLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(-60deg) translateZ(-1px);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(20deg) translateZ(-1px);
        }
      }
      @keyframes ratBLLimb {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(20deg);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(-60deg);
        }
      }
      @keyframes ratTail {
        from,
        25%,
        50%,
        75%,
        to {
          transform: rotate(30deg) translateZ(-1px);
        }
        12.5%,
        37.5%,
        62.5%,
        87.5% {
          transform: rotate(10deg) translateZ(-1px);
        }
      }

      @keyframes spinWheel {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(-360deg);
        }
      }

      .scene::after {
        content: "";
        display: block;
        width: 15em;
        height: 1.8em;
        background: radial-gradient(
          ellipse at 50% 0%,
          #00000060 0%,
          transparent 70%
        );
        margin: -1.2em auto 0;
        filter: blur(8px);
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div
        aria-label="Wheel with rotating circle and curved S patterns, rat running inside"
        role="img"
        class="wheel-and-rat"
      >
        <div class="rotating-wheel">
          <div class="s-pattern">
            <div class="s1"></div>
            <div class="s2"></div>
            <div class="s3"></div>
            <div class="s4"></div>
          </div>
          <div class="rim-pattern"></div>
          <div class="rim-pattern2"></div>
        </div>

        <div class="hub"></div>

        <div class="rat">
          <div class="rat__body">
            <div class="rat__head">
              <div class="rat__ear"></div>
              <div class="rat__eye"></div>
              <div class="rat__nose"></div>
            </div>
            <div class="rat__limb--fr"></div>
            <div class="rat__limb--fl"></div>
            <div class="rat__limb--br"></div>
            <div class="rat__limb--bl"></div>
            <div class="rat__tail"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
