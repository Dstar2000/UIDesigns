<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        min-height: 100vh;
        display: flex;
        background: #0b1120;
        color: #fff;
      }

      .container {
        display: flex;
        width: 100%;
        flex-wrap: wrap;
      }

      .left {
        flex: 1 1 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: clamp(24px, 5vw, 40px);
        background: radial-gradient(circle at 20% 30%, #1e293b, #020617 80%);
        position: relative;
        overflow: hidden;
        min-height: 400px;
      }

      .left::after {
        content: "";
        position: absolute;
        width: min(300px, 50vw);
        height: min(300px, 50vw);
        background: rgba(56, 189, 248, 0.03);
        border-radius: 50%;
        bottom: -100px;
        right: -100px;
        pointer-events: none;
      }

      .left h1 {
        font-size: clamp(2.5rem, 8vw, 3.5rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1rem;
        text-align: center;
        max-width: 100%;
      }

      .left p {
        color: #94a3b8;
        font-size: clamp(1rem, 3vw, 1.25rem);
        max-width: min(80%, 400px);
        text-align: center;
        line-height: 1.5;
      }

      .left p {
        color: #94a3b8;
        font-size: 1.05rem;
        line-height: 1.6;
        max-width: 320px;
        text-align: center;
      }

      .left p span {
        color: #38bdf8;
        font-weight: 500;
        position: relative;
      }

      .right {
        flex: 1 1 400px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f172a;
        position: relative;
        padding: clamp(24px, 5vw, 40px);
        min-height: 500px;
      }

      .right::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 80% 20%,
          rgba(56, 189, 248, 0.05),
          transparent 50%
        );
        pointer-events: none;
      }

      form {
        width: min(320px, 100%);
        position: relative;
      }

      .form-group {
        position: relative;
        margin: clamp(20px, 4vh, 26px) 0;
      }

      .form-group input {
        width: 100%;
        padding: 14px 0;
        border: none;
        border-bottom: 2px solid #334155;
        background: transparent;
        color: #fff;
        font-size: 16px;
        transition: border-color 0.2s;
      }

      .form-group input:focus {
        outline: none;
        border-bottom-color: #38bdf8;
      }

      .form-group label {
        position: absolute;
        left: 0;
        top: 14px;
        pointer-events: none;
        color: #94a3b8;
        white-space: nowrap;
      }

      .form-group label span {
        display: inline-block;
        transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      .form-group input:focus + label span,
      .form-group input:not(:placeholder-shown) + label span {
        transform: translateY(-26px);
        color: #38bdf8;
      }

      .eye {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        opacity: 0.6;
        font-size: 1.2rem;
        transition: opacity 0.2s;
        user-select: none;
      }

      .eye:hover {
        opacity: 1;
      }

      .error-message {
        color: #f87171;
        font-size: 12px;
        margin-top: 4px;
        display: none;
        word-break: break-word;
      }

      .form-group.error input {
        border-bottom-color: #f87171;
      }

      .shake {
        animation: shake 0.35s;
      }

      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-5px);
        }
        100% {
          transform: translateX(0);
        }
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #38bdf8;
        color: #0b1120;
        font-weight: 600;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
        margin-top: 8px;
        font-size: 1rem;
      }

      button:hover {
        background: #7dd3fc;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
      }

      button:active {
        transform: scale(0.98);
      }

      input::placeholder {
        color: transparent;
      }

      @media (max-width: 800px) {
        .left {
          min-height: 300px;
        }

        .left h1 {
          margin-bottom: 0.5rem;
        }
      }

      @media (max-width: 480px) {
        .left p {
          max-width: 90%;
        }

        .form-group {
          margin: 20px 0;
        }

        .form-group input {
          padding: 12px 0;
        }

        .form-group label {
          top: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h1>Create Account</h1>
        <p>
          Simple and fully animated Form.
          <span>Source code link is provided in the description.</span>
        </p>
      </div>

      <div class="right">
        <form id="form" novalidate>
          <div class="form-group" id="group-username">
            <input type="text" id="username" placeholder=" " />
            <label>
              <span style="transition-delay: 0ms">U</span>
              <span style="transition-delay: 40ms">s</span>
              <span style="transition-delay: 80ms">e</span>
              <span style="transition-delay: 120ms">r</span>
              <span style="transition-delay: 160ms">n</span>
              <span style="transition-delay: 200ms">a</span>
              <span style="transition-delay: 240ms">m</span>
              <span style="transition-delay: 280ms">e</span>
            </label>
            <div class="error-message" id="usernameError"></div>
          </div>

          <div class="form-group" id="group-email">
            <input type="email" id="email" placeholder=" " />
            <label>
              <span style="transition-delay: 0ms">E</span>
              <span style="transition-delay: 40ms">m</span>
              <span style="transition-delay: 80ms">a</span>
              <span style="transition-delay: 120ms">i</span>
              <span style="transition-delay: 160ms">l</span>
            </label>
            <div class="error-message" id="emailError"></div>
          </div>

          <div class="form-group" id="group-phone">
            <input type="text" id="phone" placeholder=" " />
            <label>
              <span style="transition-delay: 0ms">P</span>
              <span style="transition-delay: 40ms">h</span>
              <span style="transition-delay: 80ms">o</span>
              <span style="transition-delay: 120ms">n</span>
              <span style="transition-delay: 160ms">e</span>
            </label>
            <div class="error-message" id="phoneError"></div>
          </div>

          <div class="form-group" id="group-password">
            <input type="password" id="password" placeholder=" " />
            <label>
              <span style="transition-delay: 0ms">P</span>
              <span style="transition-delay: 40ms">a</span>
              <span style="transition-delay: 80ms">s</span>
              <span style="transition-delay: 120ms">s</span>
              <span style="transition-delay: 160ms">w</span>
              <span style="transition-delay: 200ms">o</span>
              <span style="transition-delay: 240ms">r</span>
              <span style="transition-delay: 280ms">d</span>
            </label>
            <span class="eye" id="toggleEye" role="button" tabindex="0"
              >👁</span
            >
            <div class="error-message" id="passwordError"></div>
          </div>

          <button type="submit">Sign Up</button>
        </form>
      </div>
    </div>

    <script>
      (function () {
        const form = document.getElementById("form");
        const fields = [
          {
            input: document.getElementById("username"),
            group: document.getElementById("group-username"),
            error: document.getElementById("usernameError"),
            validate: (val) => {
              const trimmed = val.trim();
              if (trimmed === "") return "Username is required";
              return /^[A-Za-z]+$/.test(trimmed)
                ? ""
                : "Username must contain only letters";
            },
          },
          {
            input: document.getElementById("email"),
            group: document.getElementById("group-email"),
            error: document.getElementById("emailError"),
            validate: (val) => {
              const trimmed = val.trim();
              if (trimmed === "") return "Email is required";
              return /^\S+@\S+\.\S+$/.test(trimmed)
                ? ""
                : "Enter a valid email (e.g., name@domain.com)";
            },
          },
          {
            input: document.getElementById("phone"),
            group: document.getElementById("group-phone"),
            error: document.getElementById("phoneError"),
            validate: (val) => {
              const trimmed = val.trim();
              if (trimmed === "") return "Phone number is required";
              return /^\d{10}$/.test(trimmed)
                ? ""
                : "Phone must be exactly 10 digits";
            },
          },
          {
            input: document.getElementById("password"),
            group: document.getElementById("group-password"),
            error: document.getElementById("passwordError"),
            validate: (val) => {
              if (val === "") return "Password is required";
              return val.length >= 6
                ? ""
                : "Password must be at least 6 characters";
            },
          },
        ];

        const toggleEye = document.getElementById("toggleEye");
        const passwordField = document.getElementById("password");

        toggleEye.addEventListener("click", () => {
          const type =
            passwordField.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordField.setAttribute("type", type);
        });

        function setFieldError(field, message) {
          field.error.textContent = message;
          field.error.style.display = message ? "block" : "none";
          if (message) field.group.classList.add("error");
          else field.group.classList.remove("error");
        }

        fields.forEach((field) => {
          field.input.addEventListener("input", function () {
            const msg = field.validate(this.value);
            setFieldError(field, msg);
          });
          field.input.addEventListener("blur", function () {
            const msg = field.validate(this.value);
            setFieldError(field, msg);
          });
        });

        function resetAllErrors() {
          fields.forEach((field) => {
            setFieldError(field, "");
            field.group.classList.remove("shake");
          });
        }

        form.addEventListener("submit", (e) => {
          e.preventDefault();
          resetAllErrors();

          let hasError = false;
          fields.forEach((field) => {
            const msg = field.validate(field.input.value);
            setFieldError(field, msg);
            if (msg) {
              field.group.classList.add("shake");
              hasError = true;
            }
          });

          setTimeout(() => {
            fields.forEach((field) => field.group.classList.remove("shake"));
          }, 350);

          if (!hasError) {
            alert("Signup successful ✅");
            form.reset();
            // Clear all errors without re-validating
            fields.forEach((field) => {
              setFieldError(field, "");
            });
          }
        });

        resetAllErrors();
      })();
    </script>
  </body>
</html>
