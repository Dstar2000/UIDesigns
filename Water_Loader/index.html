<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>water-Loader</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
      }

      .water-loader {
        width: fit-content;
        font-size: 80px;
        line-height: 1.5;
        font-family: system-ui, sans-serif;
        font-weight: bold;
        text-transform: uppercase;

        color: transparent;
        -webkit-text-stroke: 2px #000;

        background:
          radial-gradient(1.13em at 50% 1.6em, #000 99%, transparent 101%)
            calc(50% - 1.6em) 0 / 3.2em 100%,
          radial-gradient(1.13em at 50% -0.8em, transparent 99%, #000 101%) 50%
            0.8em / 3.2em 100% repeat-x;

        -webkit-background-clip: text;
        background-clip: text;

        animation: l9 2s linear infinite;
      }

      .water-loader::before {
        content: "Loading...";
      }

      @keyframes l9 {
        to {
          background-position:
            calc(50% + 1.6em) 0,
            calc(50% + 3.2em) 0.8em;
        }
      }
    </style>
  </head>

  <body>
    <div class="water-loader"></div>
  </body>
</html>
